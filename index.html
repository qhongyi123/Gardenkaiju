<head>
<meta charset="UTF-8">
<base href="https://qhongyi123.github.io/Gardenkaiju/">
<title>花园</title>
<!-- disable-default-loading -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
    <div class="header">
        <h1>✨ 花园 ✨</h1>
        <button class="filter-trigger" id="filter-trigger" onclick="toggleFilter()" style="display:none">🔍 筛选</button>
        <button class="filter-trigger" id="detail-edit-trigger" onclick="toggleDetailEdit()" style="display:none">📝 细致编辑</button>
    </div>

    <div class="tabs-nav">
        <button class="tab-btn active" onclick="switchTab('tab1')">前言</button>
        <button class="tab-btn" onclick="switchTab('tab2')">花园历史</button>
        <button class="tab-btn" onclick="switchTab('tab3')">开局</button>
        <button class="tab-btn" onclick="switchTab('tab4')">投稿开局</button>
        <button class="tab-btn" onclick="switchTab('tab6')">投稿角色</button>
        <button class="tab-btn" onclick="switchTab('tab7')">Mod</button>
        <button class="tab-btn" onclick="switchTab('tab8')">额外内容管理</button>
        <button class="tab-btn" onclick="switchTab('tab5')">设置</button>
    </div>

    <div class="filter-panel" id="filter-panel">
        <div class="filter-search-row">
            <input type="text" id="filter-search" class="filter-search-input" placeholder="搜索开局名称或内容..." oninput="applyFilter()">
            <button class="filter-close-btn" onclick="toggleFilter()">✕</button>
        </div>
        <div class="filter-tags-row" id="filter-tags"></div>
    </div>

    <div id="tab1" class="tab-content active">
        <div class="preface-section" id="preface-content">
            📖 加载中...
        </div>
    </div>

    <div id="tab2" class="tab-content">
        <div class="history-placeholder" id="history-content">
            📝 加载中...
        </div>
    </div>

    <div id="tab3" class="tab-content">
        <div class="card-grid" id="start-cards-grid"></div>
        <button class="fav-toggle" id="fav-toggle-starts" onclick="toggleFavoritesView('starts')">📁 收藏夹</button>
    </div>

    <div id="tab4" class="tab-content">
        <div class="card-grid" id="submission-cards-grid"></div>
        <button class="fav-toggle" id="fav-toggle-subs" onclick="toggleFavoritesView('subs')">📁 收藏夹</button>
    </div>

    <div id="tab6" class="tab-content">
        <div class="card-grid" id="character-cards-grid"></div>
        <button class="fav-toggle" id="fav-toggle-chars" onclick="toggleFavoritesView('chars')">📁 收藏夹</button>
    </div>

    <div id="tab7" class="tab-content">
        <div class="card-grid" id="mod-cards-grid"></div>
        <button class="fav-toggle" id="fav-toggle-mods" onclick="toggleFavoritesView('mods')">📁 收藏夹</button>
    </div>

    <div id="tab8" class="tab-content">
        <div class="wb-manage-section">
            <div class="wb-manage-header">
                <h3>📚 已创建的世界书（XX的世界书）</h3>
                <button class="btn btn-secondary btn-sm" onclick="refreshCreatedWorldbooks()">🔄 刷新</button>
            </div>
            <div class="wb-manage-list" id="wb-created-list">
                <div class="wb-manage-empty">点击刷新按钮加载列表...</div>
            </div>
        </div>
        <div class="wb-manage-section">
            <div class="wb-manage-header">
                <h3>🌐 当前全局挂载</h3>
                <div class="wb-manage-header-actions">
                    <button class="btn btn-danger btn-sm" onclick="clearAllGlobalWorldbooks()">🗑 一键清空</button>
                    <button class="btn btn-secondary btn-sm" onclick="refreshGlobalWorldbooks()">🔄 刷新</button>
                </div>
            </div>
            <div class="wb-manage-list" id="wb-global-list">
                <div class="wb-manage-empty">点击刷新按钮加载列表...</div>
            </div>
        </div>
    </div>

    <div id="tab5" class="tab-content">
        <div class="settings-section">
            <h3>⚙ 设置</h3>
            <div class="settings-row">
                <span class="settings-label">卡片列数：</span>
                <button class="col-btn" onclick="setColumns(1)">1</button>
                <button class="col-btn" onclick="setColumns(2)">2</button>
                <button class="col-btn" onclick="setColumns(3)">3</button>
                <button class="col-btn" onclick="setColumns(4)">4</button>
                <button class="col-btn" onclick="setColumns(5)">5</button>
            </div>
            <div class="settings-row separated">
                <span class="settings-label">界面字体字号：</span>
                <button class="col-btn" onclick="setFontSizeUI(12)">12</button>
                <button class="col-btn" onclick="setFontSizeUI(16)">16</button>
                <button class="col-btn" onclick="setFontSizeUI(20)">20</button>
                <button class="col-btn" onclick="setFontSizeUI(24)">24</button>
                <button class="col-btn" onclick="setFontSizeUI(28)">28</button>
                <button class="col-btn" onclick="setFontSizeUI(32)">32</button>
            </div>
            <div class="settings-row">
                <span class="settings-label">卡片字体字号：</span>
                <button class="col-btn" onclick="setFontSizeCards(12)">12</button>
                <button class="col-btn" onclick="setFontSizeCards(14)">14</button>
                <button class="col-btn" onclick="setFontSizeCards(18)">18</button>
                <button class="col-btn" onclick="setFontSizeCards(22)">22</button>
                <button class="col-btn" onclick="setFontSizeCards(26)">26</button>
                <button class="col-btn" onclick="setFontSizeCards(30)">30</button>
            </div>
            <div class="settings-row separated">
                <span class="settings-label">字体：</span>
                <button class="font-btn" onclick="setFontFamily('kuaile')">花间体</button>
                <button class="font-btn" onclick="setFontFamily('serif')">书简体</button>
                <button class="font-btn" onclick="setFontFamily('sans')">云水体</button>
                <button class="font-btn" onclick="setFontFamily('mashan')">墨痕体</button>
            </div>
            <div class="settings-row separated">
                <span class="settings-label">高级选项：</span>
                <label class="wb-toggle">
                    <input type="checkbox" id="setting-show-wb-name" onchange="toggleShowWbName(this.checked)">
                    <span>显示自定义世界书命名</span>
                </label>
            </div>
        </div>
    </div>
</div>

<!-- ==================== 开局详情弹窗 ==================== -->
<div class="modal-overlay" id="start-modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modal-title">开局标题</h3>
            <button class="modal-fav" id="modal-fav-btn" onclick="toggleFavoriteCard()">🌼</button>
            <button class="modal-close" onclick="closeModal('start-modal')">✕</button>
        </div>
        <div class="modal-body">
            <div class="modal-meta">
                <span class="meta-author" id="modal-author"></span>
                <span class="meta-time" id="modal-time"></span>
            </div>
            <div class="modal-tags" id="modal-tags"></div>

            <div class="modal-section-title">📄 内容粗览</div>
            <div class="modal-preview" id="modal-preview"></div>

            <div class="modal-section-title" id="modal-associated-title" style="display:none">🔗 关联内容</div>
            <div class="associated-table" id="modal-associated-table" style="display:none"></div>
            <div class="associated-batch-row" id="modal-associated-batch" style="display:none">
                <button class="btn btn-primary btn-sm" onclick="batchCreateAssociatedWorldbooks()">📝 一键创建所选</button>
                <span class="batch-hint">（为所有勾选但缺失世界书的内容创建）</span>
            </div>

            <div class="modal-character-link" id="modal-character-link" style="display:none">
                <span class="settings-label">👤 关联人物：</span>
                <span id="modal-character-name"></span>
            </div>
            <div class="settings-row" id="modal-worldbook-row" style="display:none">
                <span class="settings-label">绑定角色世界书：</span>
                <label class="wb-toggle">
                    <input type="checkbox" id="modal-bind-worldbook" checked onchange="updateBindWorldbook()">
                    <span>加载开局时同步绑定</span>
                </label>
            </div>

            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="openViewStartModal()">🔍 查看开局</button>
                <button class="btn btn-success" onclick="loadStart()">🚀 加载开局</button>
                <button class="btn btn-primary" onclick="closeModal('start-modal')">关闭</button>
            </div>
        </div>
    </div>
</div>

<!-- ==================== 查看开局弹窗（大） ==================== -->
<div class="modal-overlay" id="view-start-modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="view-modal-title">开局完整内容</h3>
            <button class="modal-close" onclick="closeModal('view-start-modal')">✕</button>
        </div>
        <div class="modal-body">
            <div class="view-content-scroll" id="view-full-content"></div>
            <div class="view-actions-bar">
                <button class="btn btn-secondary" onclick="closeModal('view-start-modal')">↩️ 返回</button>
                <button class="btn btn-success" onclick="loadStartFromView()">🚀 加载开局</button>
            </div>
        </div>
    </div>
</div>

<!-- ==================== 人物详情弹窗 ==================== -->
<div class="modal-overlay" id="character-modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="character-modal-title">人物名称</h3>
            <button class="modal-fav" id="character-modal-fav-btn" onclick="toggleFavoriteCharacter()">🌼</button>
            <button class="modal-close" onclick="closeModal('character-modal')">✕</button>
        </div>
        <div class="modal-body">
            <div class="modal-meta">
                <span class="meta-author" id="character-modal-author"></span>
            </div>
            <div class="modal-tags" id="character-modal-tags"></div>
            <div class="modal-section-title">📋 角色简介</div>
            <div class="modal-preview" id="character-modal-preview"></div>
            <div class="associated-table" id="character-associated-table" style="margin-bottom: 12px"></div>
            <div id="character-wb-name-row" class="settings-row" style="display:none">
                <span class="settings-label">世界书名称（选填）：</span>
                <input type="text" id="character-wb-name" class="wb-name-input" value="" placeholder="留空则使用默认名称">
            </div>
            <div id="character-detail-edit" style="display:none">
                <div class="modal-section-title">📝 细致编辑</div>
                <div class="settings-row">
                    <span class="settings-label">位置：</span>
                    <select id="detail-position-type" class="wb-select" onchange="toggleDepthFields()">
                        <option value="at_depth" selected>系统提示中</option>
                        <option value="before_char">角色定义前</option>
                        <option value="after_char">角色定义后</option>
                    </select>
                </div>
                <div id="detail-depth-fields">
                    <div class="settings-row">
                        <span class="settings-label">角色：</span>
                        <select id="detail-role" class="wb-select">
                            <option value="system">system</option>
                            <option value="assistant">assistant</option>
                            <option value="user">user</option>
                        </select>
                    </div>
                    <div class="settings-row">
                        <span class="settings-label">深度：</span>
                        <input type="number" id="detail-depth" class="wb-name-input" value="4" min="0" max="99" style="width:60px">
                    </div>
                </div>
                <div class="settings-row">
                    <span class="settings-label">顺序：</span>
                    <input type="number" id="detail-order" class="wb-name-input" value="0" min="0" max="9999" style="width:80px">
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="mountCharacterGlobal()">🌐 挂载到全局</button>
                <button class="btn btn-primary" onclick="closeModal('character-modal')">关闭</button>
            </div>
        </div>
    </div>
</div>

<!-- ==================== Mod详情弹窗 ==================== -->
<div class="modal-overlay" id="mod-modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="mod-modal-title">Mod名称</h3>
            <button class="modal-fav" id="mod-modal-fav-btn" onclick="toggleFavoriteMod()">🌼</button>
            <button class="modal-close" onclick="closeModal('mod-modal')">✕</button>
        </div>
        <div class="modal-body">
            <div class="modal-meta">
                <span class="meta-author" id="mod-modal-author"></span>
            </div>
            <div class="modal-tags" id="mod-modal-tags"></div>
            <div class="modal-section-title">📋 内容描述</div>
            <div class="modal-preview" id="mod-modal-preview"></div>
            <div class="associated-table" id="mod-associated-table" style="margin-bottom: 12px"></div>
            <div id="mod-wb-name-row" style="display:none">
                <div class="settings-row">
                    <span class="settings-label">世界书名称（选填）：</span>
                    <input type="text" id="mod-wb-name" class="wb-name-input" value="" placeholder="留空则使用默认名称">
                </div>
            </div>
            <div id="mod-detail-edit" style="display:none">
                <div class="modal-section-title">📝 细致编辑</div>
                <div class="settings-row">
                    <span class="settings-label">位置：</span>
                    <select id="mod-detail-position-type" class="wb-select" onchange="toggleModDepthFields()">
                        <option value="at_depth" selected>系统提示中</option>
                        <option value="before_char">角色定义前</option>
                        <option value="after_char">角色定义后</option>
                    </select>
                </div>
                <div id="mod-detail-depth-fields">
                    <div class="settings-row">
                        <span class="settings-label">角色：</span>
                        <select id="mod-detail-role" class="wb-select">
                            <option value="system">system</option>
                            <option value="assistant">assistant</option>
                            <option value="user">user</option>
                        </select>
                    </div>
                    <div class="settings-row">
                        <span class="settings-label">深度：</span>
                        <input type="number" id="mod-detail-depth" class="wb-name-input" value="4" min="0" max="99" style="width:60px">
                    </div>
                </div>
                <div class="settings-row">
                    <span class="settings-label">顺序：</span>
                    <input type="number" id="mod-detail-order" class="wb-name-input" value="0" min="0" max="9999" style="width:80px">
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="mountModGlobal()">🌐 挂载到全局</button>
                <button class="btn btn-primary" onclick="closeModal('mod-modal')">关闭</button>
            </div>
        </div>
    </div>
</div>

<script src="js/cards.js"></script>
<script src="js/app.js"></script>

</body>
